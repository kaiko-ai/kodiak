name: infrastructure

on:
  pull_request:
  push:
    branches:
      - master
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      commit_sha:
        description: "SHA to deploy"
        required: true
        type: string

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: false

env:
  SHA: ${{ github.event.pull_request.head.sha || github.sha }}
  REGISTRY: ghcr.io
  BOT_IMAGE: ghcr.io/${{ github.repository }}
  API_IMAGE: ghcr.io/${{ github.repository }}-web-api
  UI_IMAGE: ghcr.io/${{ github.repository }}-web-ui

jobs:
  lint_shell:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request' }}
    permissions: {}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Install dependencies
        run: |
          sudo apt install shellcheck
      - name: Run shellcheck
        run: ./s/shellcheck

  # ---------------------------------------------------------------------------
  # Bot image: build per-arch on native runners, then merge into multi-arch
  # TODO: re-enable arm64 once kodiak-rure has an arm64 wheel
  # ---------------------------------------------------------------------------
  build_bot:
    if: ${{ github.event_name == 'push' }}
    runs-on: ${{ matrix.platform == 'linux/amd64' && 'ubuntu-latest' || 'ubuntu-24.04-arm' }}
    permissions:
      packages: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        platform: [linux/amd64]
    steps:
      - name: Prepare platform pair
        env:
          PLATFORM: ${{ matrix.platform }}
        run: |
          echo "PLATFORM_PAIR=${PLATFORM//\//-}" >> $GITHUB_ENV
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: "{{defaultContext}}:bot"
          file: "Dockerfile"
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.BOT_IMAGE }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=kodiak-${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,scope=kodiak-${{ env.PLATFORM_PAIR }},mode=max
          provenance: false
          sbom: false
      - name: Export digest
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          mkdir -p /tmp/digests
          touch "/tmp/digests/${DIGEST#sha256:}"
      - name: Upload digest
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: bot-digests-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge_bot:
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    needs: build_bot
    permissions:
      packages: write
      contents: read
    steps:
      - name: Download digests
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: /tmp/digests
          pattern: bot-digests-*
          merge-multiple: true
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            -t "$BOT_IMAGE:$SHA" \
            $(printf "$BOT_IMAGE@sha256:%s " *)
      - name: Inspect image
        run: |
          docker buildx imagetools inspect "$BOT_IMAGE:$SHA"

  # ---------------------------------------------------------------------------
  # Web API image
  # ---------------------------------------------------------------------------
  build_api:
    if: ${{ github.event_name == 'push' }}
    runs-on: ${{ matrix.platform == 'linux/amd64' && 'ubuntu-latest' || 'ubuntu-24.04-arm' }}
    permissions:
      packages: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        platform: [linux/amd64]
    steps:
      - name: Prepare platform pair
        env:
          PLATFORM: ${{ matrix.platform }}
        run: |
          echo "PLATFORM_PAIR=${PLATFORM//\//-}" >> $GITHUB_ENV
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: "{{defaultContext}}:web_api"
          file: "Dockerfile"
          platforms: ${{ matrix.platform }}
          build-args: |
            GIT_SHA=${{ env.SHA }}
          outputs: type=image,name=${{ env.API_IMAGE }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=kodiak-web-api-${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,scope=kodiak-web-api-${{ env.PLATFORM_PAIR }},mode=max
          provenance: false
          sbom: false
      - name: Export digest
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          mkdir -p /tmp/digests
          touch "/tmp/digests/${DIGEST#sha256:}"
      - name: Upload digest
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: api-digests-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge_api:
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    needs: build_api
    permissions:
      packages: write
      contents: read
    steps:
      - name: Download digests
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: /tmp/digests
          pattern: api-digests-*
          merge-multiple: true
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            -t "$API_IMAGE:$SHA" \
            $(printf "$API_IMAGE@sha256:%s " *)
      - name: Inspect image
        run: |
          docker buildx imagetools inspect "$API_IMAGE:$SHA"

  # ---------------------------------------------------------------------------
  # Web UI image
  # TODO: re-enable arm64 once nginx base image is updated
  # ---------------------------------------------------------------------------
  build_web_ui:
    if: ${{ github.event_name == 'push' }}
    runs-on: ${{ matrix.platform == 'linux/amd64' && 'ubuntu-latest' || 'ubuntu-24.04-arm' }}
    permissions:
      packages: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        platform: [linux/amd64]
    steps:
      - name: Prepare platform pair
        env:
          PLATFORM: ${{ matrix.platform }}
        run: |
          echo "PLATFORM_PAIR=${PLATFORM//\//-}" >> $GITHUB_ENV
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: "{{defaultContext}}:web_ui"
          file: "Dockerfile"
          platforms: ${{ matrix.platform }}
          build-args: |
            GIT_SHA=${{ env.SHA }}
          outputs: type=image,name=${{ env.UI_IMAGE }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=kodiak-web-ui-${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,scope=kodiak-web-ui-${{ env.PLATFORM_PAIR }},mode=max
          provenance: false
          sbom: false
      - name: Export digest
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          mkdir -p /tmp/digests
          touch "/tmp/digests/${DIGEST#sha256:}"
      - name: Upload digest
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: webui-digests-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge_web_ui:
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    needs: build_web_ui
    permissions:
      packages: write
      contents: read
    steps:
      - name: Download digests
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: /tmp/digests
          pattern: webui-digests-*
          merge-multiple: true
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            -t "$UI_IMAGE:$SHA" \
            $(printf "$UI_IMAGE@sha256:%s " *)
      - name: Inspect image
        run: |
          docker buildx imagetools inspect "$UI_IMAGE:$SHA"
